name: Monitor Twitter

# Two trigger paths working together:
#
# 1. Self-loop (primary): each run sleeps 100s and dispatches the next run
#    via a PAT. This bypasses GitHub's schedule throttling completely —
#    workflow_dispatch is not subject to the 5-min/heavy-load throttling.
#    Result: ~2 min interval, regardless of GitHub's queue load.
#
# 2. Schedule (failsafe): low-frequency cron that revives the chain if it
#    ever breaks (workflow fails, PAT expired, GH outage). Skips Beijing
#    01:00-06:59 (= UTC 17:00-22:59). Only 4x/hour during active hours.
on:
  schedule:
    - cron: "*/15 0-16 * * *"
    - cron: "*/15 23 * * *"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Mark all current tweets as seen without pushing (use on first run)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          TWITTER_USERNAMES: ${{ vars.TWITTER_USERNAMES }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ITINERARY_WEBHOOK_URL: ${{ secrets.DISCORD_ITINERARY_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ITINERARY_CHANNEL_ID: ${{ secrets.DISCORD_ITINERARY_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          BOOTSTRAP: ${{ inputs.bootstrap }}
        run: python monitor.py

      - name: Commit state
        run: |
          if [[ -z "$(git status --porcelain state/)" ]]; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          git commit -m "chore: update seen state [skip ci]"
          # Race-tolerance: if remote moved (e.g. a manual commit landed while
          # we were polling), rebase our state commit on top and retry once.
          if ! git push 2>/tmp/push_err; then
            cat /tmp/push_err
            echo "push rejected — pulling --rebase and retrying"
            git pull --rebase --autostash || exit 1
            git push
          fi

      - name: Schedule next run (self-loop)
        # Skip self-dispatch during Beijing 01:00-06:59 (= UTC 17:00-22:59)
        # so the chain naturally pauses overnight; the schedule cron will
        # restart it at Beijing 07:00 (= UTC 23:00).
        if: ${{ inputs.bootstrap != 'true' }}
        env:
          PAT: ${{ secrets.TRIGGER_PAT }}
        run: |
          UTC_HOUR=$(date -u +%H)
          if [[ $UTC_HOUR -ge 17 && $UTC_HOUR -le 22 ]]; then
            echo "Beijing nighttime (UTC $UTC_HOUR), pausing self-loop"
            exit 0
          fi
          # Space runs ~110s apart so we don't hammer the queue
          echo "Sleeping 110s before dispatching next run..."
          sleep 110
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "next-run dispatch: HTTP $STATUS"
          # 204 is success; if PAT expired/revoked we'll fail loud and
          # the failsafe schedule cron will pick up next iteration.
          [[ "$STATUS" == "204" ]] || exit 1
