name: Monitor Twitter

# Two trigger paths working together:
#
# 1. Self-loop (primary, 24/7): each run dispatches the next via PAT.
#    Day cadence ~2 min, night cadence ~30 min. Critically: NEVER STOPS
#    so we don't depend on GitHub's unreliable schedule cron to restart.
#
# 2. Schedule (failsafe): low-frequency cron that may revive the chain
#    if it dies entirely (PAT expired, GH outage, etc.). Don't rely on it
#    — we learned the hard way it can be silent for 17+ hours.
on:
  schedule:
    # 24/7 failsafe (only relied on when self-loop is fully dead).
    # Hourly during active hours, every 2 hours overnight.
    - cron: "5 0-16,23 * * *"
    - cron: "0 17-22/2 * * *"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Mark all current tweets as seen without pushing (use on first run)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          TWITTER_USERNAMES: ${{ vars.TWITTER_USERNAMES }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ITINERARY_WEBHOOK_URL: ${{ secrets.DISCORD_ITINERARY_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ITINERARY_CHANNEL_ID: ${{ secrets.DISCORD_ITINERARY_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          BOOTSTRAP: ${{ inputs.bootstrap }}
        run: python monitor.py

      - name: Commit state
        run: |
          if [[ -z "$(git status --porcelain state/)" ]]; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          git commit -m "chore: update seen state [skip ci]"
          # Race-tolerance: if remote moved (e.g. a manual commit landed while
          # we were polling), rebase our state commit on top and retry once.
          if ! git push 2>/tmp/push_err; then
            cat /tmp/push_err
            echo "push rejected — pulling --rebase and retrying"
            git pull --rebase --autostash || exit 1
            git push
          fi

      - name: Schedule next run (self-loop)
        # Self-loop runs 24/7 so the chain never depends on GitHub's
        # unreliable schedule cron to wake us back up. Two cadences:
        #   • Day  (Beijing 07:00-00:59 = UTC 23-16): sleep 110s → ~2 min
        #   • Night (Beijing 01:00-06:59 = UTC 17-22): sleep 1700s → ~30 min
        # The chain stays alive even at night; she just gets slower
        # response while sleeping (still good enough for celebrity activity).
        if: ${{ inputs.bootstrap != 'true' }}
        env:
          PAT: ${{ secrets.TRIGGER_PAT }}
        run: |
          UTC_HOUR=$(date -u +%H)
          if [[ $UTC_HOUR -ge 17 && $UTC_HOUR -le 22 ]]; then
            SLEEP_SEC=1700
            echo "Beijing nighttime (UTC $UTC_HOUR), sleeping ${SLEEP_SEC}s before next dispatch"
          else
            SLEEP_SEC=110
            echo "Beijing active hours (UTC $UTC_HOUR), sleeping ${SLEEP_SEC}s before next dispatch"
          fi
          sleep $SLEEP_SEC
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "next-run dispatch: HTTP $STATUS"
          # 204 is success; if PAT expired/revoked we'll fail loud and
          # the failsafe schedule cron will (maybe) pick up next iteration.
          [[ "$STATUS" == "204" ]] || exit 1
